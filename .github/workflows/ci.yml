name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: react_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: react_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: django_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: django_backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t horoscope-app:test .

      - name: Smoke test container
        run: |
          docker run -d --rm \
            --name horoscope-app-smoke \
            -p 8000:8000 \
            -e DEBUG=false \
            -e SECRET_KEY=ci-smoke-test-secret-key \
            -e SECURE_SSL_REDIRECT=false \
            horoscope-app:test

          for i in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8000/api/csrf/ > /tmp/csrf.json; then
              cat /tmp/csrf.json
              docker stop horoscope-app-smoke
              exit 0
            fi
            sleep 2
          done

          docker logs horoscope-app-smoke
          docker stop horoscope-app-smoke
          exit 1
